<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Tasks Finisher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.16);
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;
    --green: #1D9E75;
    --green-light: #e6f7f2;
    --green-dark: #0F6E56;
    --red: #E24B4A;
    --red-light: #fff0f0;
    --amber: #d48000;
    --amber-light: #fff8e6;
    --blue: #3b82f6;
    --purple: #7c3aed;
    --radius: 10px;
    --radius-lg: 14px;
  }

  html, body {
    background: #ffffff !important;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  .app { max-width: 720px; margin: 0 auto; }

  /* ── Header ── */
  .header { margin-bottom: 1.75rem; }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #111; }
  .logo-icon { width: 38px; height: 38px; background: var(--green); border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .date-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); background: #fff; border: 1px solid var(--border2); border-radius: 99px; padding: 5px 13px; }

  /* ── Stats row ── */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.1rem; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .stat-val { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.blue { color: var(--blue); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: #f0f2f5; border-radius: var(--radius); padding: 4px; border: 1px solid var(--border); }
  .tab { flex: 1; padding: 8px 6px; text-align: center; font-size: 13px; font-weight: 600; border-radius: 7px; cursor: pointer; color: var(--text3); border: none; background: none; transition: all .15s; }
  .tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Progress bar card ── */
  .progress-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .progress-title { font-size: 14px; font-weight: 600; color: var(--text2); }
  .progress-count { font-size: 15px; font-weight: 700; color: var(--text); }
  .bar-bg { height: 12px; background: #f0f2f5; border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .progress-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .progress-pct { font-size: 13px; color: var(--text3); }
  .congrats { font-size: 13px; color: var(--green); font-weight: 600; display: none; }
  .congrats.show { display: block; }

  /* ── Charts row ── */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .chart-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.1rem; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .pie-wrap { display: flex; align-items: center; gap: 14px; }
  .pie-legend { display: flex; flex-direction: column; gap: 7px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Add row ── */
  .add-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .add-row input {
    flex: 1; height: 44px; padding: 0 14px;
    border: 1px solid var(--border2); border-radius: var(--radius);
    font-size: 15px; background: #fff; color: var(--text); outline: none;
  }
  .add-row input::placeholder { color: var(--text3); }
  .add-row input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,.12); }
  .add-row button {
    height: 44px; padding: 0 20px; background: var(--green); border: none;
    border-radius: var(--radius); font-size: 14px; font-weight: 600; color: #fff;
    cursor: pointer; display: flex; align-items: center; gap: 7px; white-space: nowrap;
    transition: background .15s;
  }
  .add-row button:hover { background: var(--green-dark); }
  .add-row button:active { transform: scale(.97); }

  /* ── Task list ── */
  .tasks-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .tasks-head { padding: .8rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fafbfc; }
  .tasks-head-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  .clear-done-btn { font-size: 12px; color: var(--text3); background: none; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; padding: 4px 10px; transition: all .15s; }
  .clear-done-btn:hover { color: var(--red); border-color: var(--red); background: var(--red-light); }
  .task-item { display: flex; align-items: center; gap: 12px; padding: .9rem 1.25rem; border-bottom: 1px solid var(--border); transition: background .12s; }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: #fafbfc; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
  .cb-wrap { width: 23px; height: 23px; flex-shrink: 0; border-radius: 7px; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; background: #fff; }
  .cb-wrap:hover { border-color: var(--green); }
  .cb-wrap.checked { background: var(--green); border-color: var(--green); }
  .cb-wrap svg { width: 13px; height: 13px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; display: none; }
  .cb-wrap.checked svg { display: block; }
  .task-text { flex: 1; font-size: 15px; color: #222; transition: color .2s; }
  .task-time { font-size: 11px; color: var(--text3); white-space: nowrap; background: #f0f2f5; padding: 2px 7px; border-radius: 99px; }
  .task-del { background: none; border: none; color: #ccc; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; opacity: 0; transition: opacity .15s; }
  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--red); background: var(--red-light); }
  .task-del svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
  .empty-state { padding: 2.5rem 1.25rem; text-align: center; color: var(--text3); font-size: 15px; }
  .empty-state .icon { font-size: 38px; margin-bottom: 8px; }

  /* ── History tab ── */
  .history-section { display: flex; flex-direction: column; gap: 14px; }
  .hchart-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .hchart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .hchart-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
  .clear-history-btn { font-size: 12px; color: var(--text3); background: none; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; padding: 4px 10px; transition: all .15s; }
  .clear-history-btn:hover { color: var(--red); border-color: var(--red); background: var(--red-light); }
  .bar-chart-wrap { overflow-x: auto; }
  .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 160px; padding-bottom: 28px; position: relative; min-width: 200px; }
  .bar-chart::before { content: ''; position: absolute; left: 0; right: 0; top: 0; bottom: 28px; background: repeating-linear-gradient(to bottom, #f0f2f5 0px, #f0f2f5 1px, transparent 1px, transparent 40px); }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 40px; position: relative; }
  .bar-rect { width: 100%; border-radius: 5px 5px 0 0; transition: height .4s ease; min-height: 3px; position: relative; cursor: default; }
  .bar-rect:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #222; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 5px; white-space: nowrap; pointer-events: none; z-index: 10; }
  .bar-pct-label { font-size: 11px; font-weight: 700; color: var(--text2); }
  .bar-date-label { font-size: 10px; color: var(--text3); position: absolute; bottom: 0; text-align: center; width: 100%; }
  .no-history { padding: 2rem 1.25rem; text-align: center; color: var(--text3); font-size: 14px; }
  .history-list-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .history-row { display: flex; align-items: center; gap: 12px; padding: .75rem 1.25rem; border-bottom: 1px solid var(--border); }
  .history-row:last-child { border-bottom: none; }
  .h-date { font-size: 13px; font-weight: 600; color: var(--text); min-width: 100px; }
  .h-bar-wrap { flex: 1; height: 7px; background: #f0f2f5; border-radius: 99px; overflow: hidden; }
  .h-bar { height: 100%; border-radius: 99px; }
  .h-pct { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }
  .h-tasks { font-size: 12px; color: var(--text3); min-width: 55px; text-align: right; }

  canvas { display: block; }

  @media (max-width: 520px) {
    .charts-row { grid-template-columns: 1fr; }
    .stats-row { gap: 8px; }
    .stat-val { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1>
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Daily Tasks Finisher
      </h1>
      <div class="date-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="date-label"></span>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Tasks</div>
      <div class="stat-val blue" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completed</div>
      <div class="stat-val green" id="stat-done">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Remaining</div>
      <div class="stat-val red" id="stat-rem">0</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks', this)">📋 Tasks</button>
    <button class="tab" onclick="switchTab('analytics', this)">📊 Analytics</button>
    <button class="tab" onclick="switchTab('history', this)">📈 History</button>
  </div>

  <!-- ─── Tasks Tab ─── -->
  <div class="tab-panel active" id="tab-tasks">
    <!-- Progress bar -->
    <div class="progress-card">
      <div class="progress-top">
        <span class="progress-title">Today's progress</span>
        <span class="progress-count" id="prog-count">0 / 0</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="prog-bar" style="width:0%;background:#1D9E75"></div></div>
      <div class="progress-bottom">
        <span class="progress-pct" id="prog-pct">0% complete</span>
        <span class="congrats" id="congrats">🎉 All done — great work!</span>
      </div>
    </div>

    <!-- Add task -->
    <div class="add-row">
      <input type="text" id="task-input" placeholder="Type a task and press Enter…" maxlength="100" />
      <button onclick="addTask()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>

    <!-- Task list -->
    <div class="tasks-card">
      <div class="tasks-head">
        <span class="tasks-head-title">Tasks for today</span>
        <button class="clear-done-btn" onclick="clearDone()">Clear completed</button>
      </div>
      <div id="task-list"></div>
    </div>
  </div>

  <!-- ─── Analytics Tab ─── -->
  <div class="tab-panel" id="tab-analytics">
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Today's breakdown</div>
        <div class="pie-wrap">
          <canvas id="pie-chart" width="110" height="110"></canvas>
          <div class="pie-legend" id="pie-legend"></div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Completion rate</div>
        <canvas id="donut-chart" width="110" height="110" style="display:block;margin:0 auto"></canvas>
        <div style="text-align:center;margin-top:8px;font-size:22px;font-weight:700;color:#1D9E75" id="donut-pct">0%</div>
        <div style="text-align:center;font-size:12px;color:#999">of today's tasks</div>
      </div>
    </div>
    <div class="hchart-card">
      <div class="hchart-head">
        <span class="hchart-title">Weekly overview (last 7 days)</span>
      </div>
      <div class="bar-chart-wrap">
        <div class="bar-chart" id="weekly-bar"></div>
      </div>
    </div>
  </div>

  <!-- ─── History Tab ─── -->
  <div class="tab-panel" id="tab-history">
    <div class="history-section">
      <div class="hchart-card">
        <div class="hchart-head">
          <span class="hchart-title">Completion % per day</span>
          <button class="clear-history-btn" onclick="clearHistory()">Clear history</button>
        </div>
        <div class="bar-chart-wrap">
          <div class="bar-chart" id="history-bar"></div>
        </div>
      </div>
      <div class="history-list-card" id="history-list-wrap">
        <div id="history-list"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Date helpers ──
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatKey(key) {
  if (key === todayKey()) return 'Today';
  const [y,m,d] = key.split('-');
  const dt = new Date(+y, +m-1, +d);
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  if (key === formatDate(yest)) return 'Yesterday';
  return `${DAYS_FULL[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${dt.getDate()}`;
}

function shortKey(key) {
  const [y,m,d] = key.split('-');
  const dt = new Date(+y,+m-1,+d);
  return `${MONTHS[dt.getMonth()]} ${dt.getDate()}`;
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function timeNow() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes(), ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

// Set header date
const now = new Date();
document.getElementById('date-label').textContent =
  `${DAYS_FULL[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

// ── Storage ──
const TODAY = todayKey();
const TASKS_KEY = `dtf_tasks_${TODAY}`;
const HISTORY_KEY = 'dtf_history';

function loadTasks() {
  try { return JSON.parse(localStorage.getItem(TASKS_KEY)) || []; } catch { return []; }
}
function saveTasks(t) {
  localStorage.setItem(TASKS_KEY, JSON.stringify(t));
  saveHistory(t);
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {}; } catch { return {}; }
}
function saveHistory(t) {
  const h = loadHistory();
  h[TODAY] = { total: t.length, done: t.filter(x => x.done).length, ts: Date.now() };
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}
function clearHistory() {
  if (!confirm('Clear all history? This cannot be undone.')) return;
  const h = loadHistory();
  const te = h[TODAY];
  localStorage.setItem(HISTORY_KEY, JSON.stringify(te ? { [TODAY]: te } : {}));
  renderHistory();
}

// ── State ──
let tasks = loadTasks();
let nextId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1;

// ── Pie/Donut canvas drawing ──
function drawPie(canvas, segments) {
  // segments: [{color, value}]
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 4;
  const total = segments.reduce((s,x) => s + x.value, 0);
  if (total === 0) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = '#f0f2f5'; ctx.fill();
    return;
  }
  let angle = -Math.PI/2;
  segments.forEach(seg => {
    const slice = (seg.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    angle += slice;
  });
}

function drawDonut(canvas, pct) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 6, lw = 14;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = '#f0f2f5'; ctx.lineWidth = lw; ctx.stroke();
  if (pct > 0) {
    const color = pct === 100 ? '#1D9E75' : pct >= 50 ? '#3b82f6' : '#d48000';
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + (pct/100)*Math.PI*2);
    ctx.strokeStyle = color; ctx.lineWidth = lw;
    ctx.lineCap = 'round'; ctx.stroke();
  }
}

// ── Bar chart (canvas-free, pure DOM) ──
function renderBarChart(containerId, entries) {
  // entries: [{label, pct, done, total, color}]
  const el = document.getElementById(containerId);
  if (!entries.length) {
    el.innerHTML = '<div style="font-size:14px;color:#999;padding:1rem;text-align:center;width:100%">No data yet — complete some tasks!</div>';
    return;
  }
  const maxPct = Math.max(...entries.map(e => e.pct), 1);
  const chartH = 132; // usable bar height above date labels
  el.innerHTML = '';
  entries.forEach(e => {
    const barH = Math.round((e.pct / 100) * chartH);
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.style.height = (chartH + 28) + 'px';
    col.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;width:100%">
        <div class="bar-pct-label">${e.pct}%</div>
        <div class="bar-rect" style="height:${Math.max(barH,3)}px;background:${e.color}" data-tip="${e.done}/${e.total} tasks · ${e.pct}%"></div>
      </div>
      <div class="bar-date-label">${e.label}</div>
    `;
    el.appendChild(col);
  });
}

// ── Render tasks ──
function render() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const rem = total - done;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-rem').textContent = rem;
  document.getElementById('prog-count').textContent = `${done} / ${total}`;

  const bar = document.getElementById('prog-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct === 100 ? '#1D9E75' : pct >= 50 ? '#3b82f6' : '#d48000';

  document.getElementById('prog-pct').textContent = pct + '% complete';
  const cg = document.getElementById('congrats');
  if (pct === 100 && total > 0) cg.classList.add('show'); else cg.classList.remove('show');

  const list = document.getElementById('task-list');
  if (!tasks.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>No tasks yet — add one above!</div>`;
    return;
  }

  list.innerHTML = '';
  tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-item' + (task.done ? ' done' : '');
    item.innerHTML = `
      <div class="cb-wrap ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id})" tabindex="0"
           role="checkbox" aria-checked="${task.done}">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="task-text">${esc(task.text)}</span>
      ${task.doneAt ? `<span class="task-time">✓ ${task.doneAt}</span>` : ''}
      <button class="task-del" onclick="delTask(${task.id})" aria-label="Delete">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;
    list.appendChild(item);
  });
  list.querySelectorAll('.cb-wrap').forEach(cb => {
    cb.addEventListener('keydown', e => { if(e.key===' '||e.key==='Enter'){e.preventDefault();cb.click();} });
  });
}

// ── Render analytics ──
function renderAnalytics() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const rem = total - done;
  const pct = total ? Math.round((done / total) * 100) : 0;

  // Pie chart
  const pie = document.getElementById('pie-chart');
  drawPie(pie, [
    { color: '#1D9E75', value: done },
    { color: '#f0f2f5', value: rem }
  ]);

  const legend = document.getElementById('pie-legend');
  legend.innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div><span>Done: <b>${done}</b></span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#e2e8f0"></div><span>Remaining: <b>${rem}</b></span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div><span>Total: <b>${total}</b></span></div>
  `;

  // Donut
  const donut = document.getElementById('donut-chart');
  drawDonut(donut, pct);
  document.getElementById('donut-pct').textContent = pct + '%';
  document.getElementById('donut-pct').style.color = pct===100?'#1D9E75':pct>=50?'#3b82f6':'#d48000';

  // Weekly bar — last 7 days
  const history = loadHistory();
  const entries = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = formatDate(d);
    const h = history[key] || { total: 0, done: 0 };
    const p = h.total ? Math.round((h.done/h.total)*100) : 0;
    const color = p===100?'#1D9E75':p>=50?'#3b82f6':p>0?'#d48000':'#e2e8f0';
    entries.push({ label: key===TODAY?'Today':DAYS[d.getDay()], pct: p, done: h.done, total: h.total, color });
  }
  renderBarChart('weekly-bar', entries);
}

// ── Render history ──
function renderHistory() {
  const history = loadHistory();
  const keys = Object.keys(history).sort().reverse();
  const el = document.getElementById('history-list');

  // History bar chart (all days)
  const barEntries = [...keys].reverse().map(key => {
    const { total, done } = history[key];
    const p = total ? Math.round((done/total)*100) : 0;
    const color = p===100?'#1D9E75':p>=50?'#3b82f6':p>0?'#d48000':'#e2e8f0';
    return { label: shortKey(key), pct: p, done, total, color };
  });
  renderBarChart('history-bar', barEntries.slice(-14));

  if (!keys.length) {
    el.innerHTML = `<div class="no-history">No history yet — complete tasks to build your record!</div>`;
    return;
  }

  el.innerHTML = '';
  keys.forEach(key => {
    const { total, done } = history[key];
    const pct = total ? Math.round((done/total)*100) : 0;
    const color = pct===100?'#1D9E75':pct>=50?'#3b82f6':'#d48000';
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `
      <div class="h-date">${formatKey(key)}</div>
      <div class="h-bar-wrap"><div class="h-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="h-pct" style="color:${color}">${pct}%</div>
      <div class="h-tasks">${done}/${total}</div>
    `;
    el.appendChild(row);
  });
}

// ── Actions ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp.value.trim();
  if (!text) return;
  tasks.push({ id: nextId++, text, done: false, addedAt: timeNow(), doneAt: null });
  inp.value = ''; inp.focus();
  saveTasks(tasks);
  render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? timeNow() : null;
  saveTasks(tasks);
  render();
}

function delTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(tasks);
  render();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  saveTasks(tasks);
  render();
}

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'analytics') renderAnalytics();
  if (name === 'history') renderHistory();
}

// ── Init ──
document.getElementById('task-input').addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });
render();
</script>
